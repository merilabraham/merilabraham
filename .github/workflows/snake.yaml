name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@e2cedf76a2c05b25d09a6428ded69727b497a700 # v3.4.1
        with:
          github_user_name: merilabraham
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Checkout output branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: output
          path: output

      - name: Copy snake SVGs and push
        run: |
          cp dist/github-snake.svg output/
          cp dist/github-snake-dark.svg output/
          cd output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-snake.svg github-snake-dark.svg
          git diff --staged --quiet && exit 0
          git commit -m "Update snake animation"
          git push